 <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống KLTN – UTE FE</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0052CC;
  --primary-light: #0065FF;
  --primary-dark: #003E99;
  --accent: #FF5630;
  --accent2: #36B37E;
  --accent3: #FFAB00;
  --bg: #F4F5F7;
  --surface: #FFFFFF;
  --surface2: #FAFBFC;
  --border: #DFE1E6;
  --text: #172B4D;
  --text2: #42526E;
  --text3: #7A869A;
  --shadow: 0 1px 3px rgba(9,30,66,.12), 0 0 0 1px rgba(9,30,66,.08);
  --shadow-lg: 0 8px 24px rgba(9,30,66,.15), 0 2px 6px rgba(9,30,66,.1);
  --radius: 8px;
  --radius-lg: 12px;
  --transition: 0.18s cubic-bezier(.4,0,.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* =========== SCREENS =========== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* =========== LOGIN =========== */
#screen-login {
  align-items: center; justify-content: center; position: relative; overflow: hidden;
}
#screen-login .login-bg {
  position: absolute; inset: 0;
  background: url('bg.jpg') center/cover no-repeat;
  z-index: 0;
}
#screen-login .login-bg-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,30,90,0.38) 0%, rgba(0,60,160,0.28) 50%, rgba(0,100,200,0.18) 100%);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 1;
}
.login-card {
  background: rgba(255,255,255,0.97); border-radius: 20px; padding: 44px 40px 36px;
  width: 420px; box-shadow: 0 24px 72px rgba(0,20,90,0.28), 0 4px 16px rgba(0,0,0,0.10);
  position: relative; z-index: 2;
  animation: cardIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
.login-logo-icon {
  width: 56px; height: 56px; border-radius: 12px; overflow: hidden; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(0,50,150,0.15);
}
.login-logo-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
.login-logo-text h1 { font-size: 17px; font-weight: 700; color: var(--primary-dark); }
.login-logo-text p { font-size: 11.5px; color: var(--text3); }
.login-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.login-sub { font-size: 14px; color: var(--text3); margin-bottom: 28px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius);
  font-family: inherit; font-size: 14px; color: var(--text); background: var(--surface2);
  transition: var(--transition); outline: none;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(0,82,204,.12);
}
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 20px; border-radius: var(--radius); font-family: inherit;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); border: none;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-light); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,82,204,.3); }
.btn-primary:active { transform: translateY(0); }
.btn-full { width: 100%; padding: 12px; font-size: 15px; }
.btn-danger { background: var(--accent); color: #fff; }
.btn-danger:hover { background: #FF3015; }
.btn-success { background: var(--accent2); color: #fff; }
.btn-success:hover { background: #2d9d6e; }
.btn-warning { background: var(--accent3); color: #172B4D; }
.btn-warning:hover { background: #e8a000; }
.btn-ghost { background: transparent; color: var(--text2); border: 2px solid var(--border); }
.btn-ghost:hover { background: var(--bg); border-color: var(--text3); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.quick-logins { margin-top: 20px; }
.quick-logins p { font-size: 12px; color: var(--text3); margin-bottom: 8px; text-align: center; }
.quick-login-btns { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.quick-login-btns button {
  padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
  font-family: inherit; font-size: 11px; cursor: pointer; background: var(--bg); color: var(--text2); transition: var(--transition);
}
.quick-login-btns button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

/* =========== LAYOUT =========== */
#screen-app { flex-direction: row; }
.sidebar {
  width: 240px; background: var(--primary-dark); color: #fff;
  display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
}
.sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,.12); }
.sidebar-logo { display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon {
  width: 36px; height: 36px; background: rgba(255,255,255,.2); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;
}
.sidebar-logo-text h2 { font-size: 15px; font-weight: 700; }
.sidebar-logo-text p { font-size: 10px; opacity: .6; }
.sidebar-user { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,.12); }
.sidebar-user-name { font-size: 13px; font-weight: 600; }
.sidebar-user-role { font-size: 11px; opacity: .6; margin-top: 2px; }
.sidebar-role-badge {
  display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px;
  font-weight: 700; margin-top: 4px; background: rgba(255,255,255,.2);
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section { padding: 8px 16px 4px; font-size: 10px; font-weight: 700; opacity: .4; text-transform: uppercase; letter-spacing: 1px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  cursor: pointer; transition: var(--transition); font-size: 13px; font-weight: 500;
  border-radius: 0; position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.1); }
.nav-item.active { background: rgba(255,255,255,.18); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #fff; border-radius: 0 2px 2px 0; }
.nav-item-icon { font-size: 16px; opacity: .8; }
.nav-item-badge {
  margin-left: auto; background: var(--accent); color: #fff; padding: 1px 6px;
  border-radius: 10px; font-size: 10px; font-weight: 700;
}
.sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,.12); }
.main-content { margin-left: 240px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px;
  height: 56px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 3px rgba(9,30,66,.08);
}
.topbar-title { font-size: 16px; font-weight: 700; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.notif-btn {
  position: relative; width: 36px; height: 36px; border-radius: 8px;
  background: var(--bg); border: none; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; transition: var(--transition);
}
.notif-btn:hover { background: var(--border); }
.notif-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; border: 2px solid var(--surface); }
.page { padding: 24px; flex: 1; }

/* =========== CARDS & COMMON =========== */
.card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-size: 15px; font-weight: 700; }
.card-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: 16px;
}
.stat-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.stat-icon.blue { background: #E9F2FF; }
.stat-icon.green { background: #E3FCEF; }
.stat-icon.orange { background: #FFF7D6; }
.stat-icon.red { background: #FFEBE6; }
.stat-value { font-size: 28px; font-weight: 800; }
.stat-label { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Table */
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--bg); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }

/* Badge/Status */
.badge {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
}
.badge-blue { background: #E9F2FF; color: #0052CC; }
.badge-green { background: #E3FCEF; color: #006644; }
.badge-orange { background: #FFF7D6; color: #974F0C; }
.badge-red { background: #FFEBE6; color: #BF2600; }
.badge-purple { background: #EAE6FF; color: #403294; }
.badge-gray { background: #F4F5F7; color: #42526E; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab-btn {
  padding: 10px 18px; font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; background: none; color: var(--text3);
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition);
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-btn:hover { color: var(--primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(9,30,66,.5);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 560px;
  max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 6px; border: none; background: var(--bg); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Toast */
.toast-container { position: fixed; top: 16px; right: 16px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
  animation: toastIn .3s ease; max-width: 320px;
}
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast-success { background: #E3FCEF; color: #006644; border: 1px solid #57D9A3; }
.toast-error { background: #FFEBE6; color: #BF2600; border: 1px solid #FF8F73; }
.toast-info { background: #E9F2FF; color: #0052CC; border: 1px solid #4C9AFF; }

/* Notification panel */
.notif-panel {
  position: fixed; right: 0; top: 56px; width: 360px; background: var(--surface);
  border-left: 1px solid var(--border); box-shadow: var(--shadow-lg);
  height: calc(100vh - 56px); overflow-y: auto; z-index: 80; display: none;
}
.notif-panel.open { display: block; }
.notif-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 15px; }
.notif-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: var(--transition); }
.notif-item:hover { background: var(--bg); }
.notif-item.unread { background: #E9F2FF20; border-left: 3px solid var(--primary); }
.notif-item-title { font-size: 13px; font-weight: 600; }
.notif-item-body { font-size: 12px; color: var(--text3); margin-top: 3px; }
.notif-item-time { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

/* Timeline */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
.tl-item { position: relative; padding-bottom: 20px; }
.tl-dot {
  position: absolute; left: -20px; top: 2px; width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--primary); background: var(--surface);
}
.tl-dot.done { background: var(--accent2); border-color: var(--accent2); }
.tl-dot.pending { background: var(--accent3); border-color: var(--accent3); }
.tl-dot.active { background: var(--primary); border-color: var(--primary); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(0,82,204,.4);} 50%{ box-shadow: 0 0 0 6px rgba(0,82,204,0);} }
@keyframes spin { to { transform: rotate(360deg); } }
.tl-title { font-size: 13px; font-weight: 600; }
.tl-desc { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* Upload area */
.upload-area {
  border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px;
  text-align: center; cursor: pointer; transition: var(--transition);
}
.upload-area:hover { border-color: var(--primary); background: #E9F2FF30; }
.upload-area.has-file { border-color: var(--accent2); background: #E3FCEF30; }
.upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-text { font-size: 13px; color: var(--text3); }
.uploaded-file { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius); margin-top: 8px; font-size: 13px; }

/* Progress steps */
.progress-steps { display: flex; align-items: center; margin-bottom: 24px; }
.step { display: flex; align-items: center; flex: 1; }
.step:last-child { flex: 0; }
.step-circle {
  width: 28px; height: 28px; border-radius: 50%; background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--text3); flex-shrink: 0;
}
.step-circle.done { background: var(--accent2); color: #fff; }
.step-circle.active { background: var(--primary); color: #fff; }
.step-label { font-size: 10px; color: var(--text3); margin-left: 6px; white-space: nowrap; }
.step-line { flex: 1; height: 2px; background: var(--border); margin: 0 8px; }
.step-line.done { background: var(--accent2); }

/* Role colors */
.role-sv { background: #EAE6FF; color: #403294; }
.role-gv { background: #E3FCEF; color: #006644; }
.role-bm { background: #E9F2FF; color: #0052CC; }
.role-hd { background: #FFF7D6; color: #974F0C; }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; }
.empty-state-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.empty-state-desc { font-size: 13px; color: var(--text3); }

/* Score input */
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.score-item label { font-size: 12px; font-weight: 600; color: var(--text2); display: block; margin-bottom: 4px; }
.score-item input { width: 100%; padding: 8px 10px; border: 2px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 14px; font-weight: 700; text-align: center; }
.score-total { background: var(--primary); color: #fff; border-radius: var(--radius); padding: 12px 16px; text-align: center; margin-top: 12px; }
.score-total-value { font-size: 28px; font-weight: 800; }
.score-total-label { font-size: 12px; opacity: .8; }

/* Search bar */
.search-bar { display: flex; align-items: center; gap: 8px; }
.search-input { padding: 8px 12px 8px 36px; border: 2px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: 13px; width: 240px; background: var(--surface2); outline: none; transition: var(--transition); position: relative; }
.search-input:focus { border-color: var(--primary); }
.search-wrap { position: relative; }
.search-wrap::before { content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; z-index: 1; }

/* =========== PAGES =========== */
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 22px; font-weight: 800; }
.page-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }

/* Info rows */
.info-row { display: flex; gap: 8px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
.info-label { font-size: 12px; color: var(--text3); min-width: 140px; padding-top: 1px; }
.info-value { font-size: 13px; font-weight: 500; }

/* Action row */
.action-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>

  <div class="login-card">

  <!-- Sidebar -->

  <div class="sidebar-logo" style="display:flex; align-items:center; gap:10px;">
    
    <!-- Logo ảnh -->

      <img src="logok.png"

    <!-- Text -->

      <p style="margin:0; font-size:12px;">FE – Khoa Kinh tế</p>

  </div>

</div>
    <div class="sidebar-user">

      <span class="sidebar-role-badge" id="sb-role">Sinh viên</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
    <style>
  /* Trạng thái bình thường: Màu sáng hơn */
  .btn-logout-custom {
    background-color: #f8f9fa; /* Màu trắng xám sáng */
    color: #333;
    border: 1px solid #ddd;
    transition: all 0.3s ease; /* Hiệu ứng mượt mà */
  }

  /* Khi di chuột vào (Hover) hoặc nhấn */

    </div>
  </aside>

  <!-- Main -->

/** Base URL API + đường dẫn tải file upload (dùng trước khi script API load xong) */
function getApiBaseUrl() {
  if (typeof window !== 'undefined' && window.API_BASE) return String(window.API_BASE).replace(/\/$/, '');
  return 'http://127.0.0.1:5000';
}
function uploadFileHref(storedPath) {
  if (!storedPath) return '#';
  const base = getApiBaseUrl();
  const rel = String(storedPath).replace(/^uploads[\\/]/i, '').replace(/\\/g, '/');
  return base + '/uploads/' + rel.split('/').map((seg) => encodeURIComponent(seg)).join('/');
}

function getCurrentStudentMajor() {
  const u = DB.currentUser;
  if (!u || u.role !== 'sv') return '';
  const majors = Array.isArray(u.chuyenMon) ? u.chuyenMon.filter(Boolean).map((m) => String(m).trim()) : [];
  return majors[0] || '';
}

/** Đợt đăng ký cho SV: chỉ lọc theo ngành (nganh ↔ chuyenMon); không tách Đại trà/CLC. */
function dotMatchesStudentHeAndMajor(d) {
  const u = DB.currentUser;
  if (!u || u.role !== 'sv') return true;
  const majors = u.chuyenMon || [];
  const nganh = (d.nganh || '').trim();
  if (nganh && majors.length) {
    return majors.indexOf(nganh) >= 0;
  }
  if (!nganh && majors.length && majors[0] && d.ten) {
    return d.ten.includes(majors[0]);
  }
  return true;
}

/** Hệ SV để khớp gv_slot: CLC hoặc Đại trà (mặc định). */
function normalizeStudentSlotHe(u) {
  if (!u) return 'DaiTra';
  return (u.heDaoTao || '').trim() === 'CLC' ? 'CLC' : 'DaiTra';
}

/** Một dòng gv_slot (BCTT) theo GV + đợt + hệ sinh viên đang đăng nhập. */
function gvBcttSlotRow(gvId, dotId) {
  const he = normalizeStudentSlotHe(DB.currentUser);
  return (DB.gvSlots || []).find(
    (s) => Number(s.gvId) === Number(gvId) && String(s.dotId) === String(dotId) && (s.heDaoTao || 'DaiTra') === he
  );
}

/** Cho phép đăng ký BCTT: có slot đúng hệ; nếu TBM chưa bật duyệt slot vẫn cho chọn. */
function gvAcceptsBcttRegistration(gvId, dotId) {
  const sl = gvBcttSlotRow(gvId, dotId);

}

function isBCTTVisibleForCurrentUser(b) {
  const u = DB.currentUser;
  if (!u || !b) return false;
  if (u.role === 'sv') return b.svEmail === u.email;
  if (u.role === 'bm') {
    if (!u.chuyenMon || !u.chuyenMon.length) return true;
    return u.chuyenMon.some(n => (b.tenDot || '').includes(n));
  }
  if (u.role === 'gv') return b.gvEmail === u.email;
  return true;
}
function isKLTNVisibleForCurrentUser(k) {
  const u = DB.currentUser;
  if (!u || !k) return false;
  if (u.role === 'sv') return k.svEmail === u.email;
    if (u.role === 'bm') {
    if (!u.chuyenMon || !u.chuyenMon.length) return true;
    return u.chuyenMon.some(n => (k.tenDot || '').includes(n));
  }
  if (u.role === 'gv') {
    if (k.gvHDEmail === u.email || k.gvPBEmail === u.email) return true;
    if (k.hoiDong) {
      const h = k.hoiDong;
      if (h.ct === u.email || h.tk === u.email) return true;
      if (Array.isArray(h.tv) && h.tv.includes(u.email)) return true;
    }
    return false;
  }
  return true;
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
/** Nội dung đặt trong <textarea>…</textarea> (tránh đóng thẻ sớm) */
function escapeForTextarea(s) {
  if (s == null) return '';

}

/** Điểm tổng hợp (20% HD + 20% PB + 60% TB hội đồng: CT + TV) — khớp backend finalize */
function computeKLTNFinalAvg(k) {
  if (!k || k.diemHD == null || k.diemPB == null || k.diemBB == null) return null;
  const tvs = (k.tvScores || []).map((t) => t.diem).filter((d) => d != null && !Number.isNaN(Number(d)));
  const hoiDongScores = [...tvs, Number(k.diemBB)];
  if (!hoiDongScores.length) return null;
  const avgHd = hoiDongScores.reduce((a, b) => a + b, 0) / hoiDongScores.length;
  return Number(k.diemHD) * 0.2 + Number(k.diemPB) * 0.2 + avgHd * 0.6;
}

    const isTV = k.hoiDong && Array.isArray(k.hoiDong.tv) && k.hoiDong.tv.includes(u.email);

    if (st === 'bao_ve' && (isPB || isTV)) return false;
    return true;
  });
}

async function buildNotifPanel() {

  el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Đang tải...</div>';

  const u = DB.currentUser;
  if (u && u.role === 'sv') {
    try {
      const res = await apiRequest("/api/thong-bao", { method: "GET" });
      const list = res.data?.thong_bao || [];
      if (!list.length) {
        el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">Không có thông báo</div>';
        return;
      }
      el.innerHTML = `
        <div style="padding:10px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="markAllNotifRead()">✓ Đánh dấu tất cả đã đọc</button>

      ` + list.map(n => {
        const chuaDoc = !n.da_doc;
        const tieuDe = n.loai === 'tu_choi_gvhd' ? '❌ Giảng viên HD yêu cầu chỉnh sửa lại' : '❌ Chủ tịch HĐ yêu cầu chỉnh sửa lại';
        return `
          <div class="notif-item ${chuaDoc ? 'unread' : ''}" onclick="markOneNotifRead(${n.id}, this)">
            <div class="notif-item-title">${tieuDe}</div>
            <div class="notif-item-body" style="color:var(--text);margin-top:6px">
              <strong>Lý do / Yêu cầu:</strong><br>
              <span style="background:#FFF7D6;padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px">
                ${escapeHtml(n.noi_dung) || '(Không có ghi chú cụ thể)'}
              </span>
            </div>
            <div class="notif-item-body" style="margin-top:4px">Từ: <strong>${escapeHtml(n.ten_nguoi_gui) || 'Giảng viên'}</strong></div>
            <div class="notif-item-time">${n.tao_luc}</div>
          </div>`;
      }).join('');

      // Cập nhật badge số đỏ
      const chuaDocCount = list.filter(n => !n.da_doc).length;

function submitBCTT() {
  const ten = document.getElementById('f-tenDeTai').value.trim();
  const mang = document.getElementById('f-mang').value;
  const congty = document.getElementById('f-congty').value.trim();
  const gv = document.getElementById('f-gv').value;
  const dot = document.getElementById('f-dot').value;
  if (!ten || !mang || !congty || !gv || !dot) { toast('Vui lòng điền đầy đủ thông tin!', 'error'); return; }
  const gvUser = getUser(gv);
  const dotId = extractId(dot);
  if (!gvUser || !dotId || !gvAcceptsBcttRegistration(gvUser.id, dotId)) {
    toast('GV không khả dụng hoặc đã hết slot theo hệ của bạn trong đợt này.', 'error');
    return;
  }
  const id = 'bctt' + Date.now();
  DB.bcttList.push({ id, svEmail: DB.currentUser.email, tenDeTai: ten, mangDeTai: mang, tenCongTy: congty, gvEmail: gv, dotId: dot, trangThai: 'cho_duyet', ngayDangKy: new Date().toISOString().split('T')[0], fileBC: null, fileXacNhan: null });
  //gvUser.quota = Math.max((gvUser.quota || 0) - 1, 0);
  addNotif(gv, 'SV đăng ký BCTT mới', `${DB.currentUser.name} đăng ký đề tài: ${ten}`);
  toast('Đăng ký BCTT thành công! Đang chờ GV xác nhận.');
  renderBCTT();
}

function renderGVOptionsByField() {
  const mang = document.getElementById('f-mang')?.value || '';
  const dotId = document.getElementById('f-dot')?.value || '';
  const dot = DB.dotDangKy.find((x) => String(x.id) === String(dotId));
  const select = document.getElementById('f-gv');
  if (!select) return;
  const prevSelected = select.value;

  const list = DB.users
    .filter(u => {
      if (!(u.role === 'gv' || u.role === 'bm')) return false;
      if (dotId && !gvAcceptsBcttRegistration(u.id, dotId)) return false;
      if (mang && !(Array.isArray(u.chuyenMon) && u.chuyenMon.includes(mang))) return false;
      if (dot && dot.nganh && !(Array.isArray(u.chuyenMon) && u.chuyenMon.includes(dot.nganh))) return false;
      return true;
    })
    .slice()
    .sort((a, b) => {
      const sa = gvBcttSlotRow(a.id, dotId);
      const sb = gvBcttSlotRow(b.id, dotId);
      const aq = sa ? (sa.slotConLai || 0) : 0;
      const bq = sb ? (sb.slotConLai || 0) : 0;
      if (aq !== bq) return bq - aq;
      return String(a.name).localeCompare(String(b.name), 'vi');
    });

  const heLabel = normalizeStudentSlotHe(DB.currentUser);
  const gvPlaceholder = dotId
    ? `-- Chọn GV (hệ ${heLabel}) --`
    : '-- Chọn GV --';
  select.innerHTML =
    `<option value="">${gvPlaceholder}</option>` +
    list
      .map((g) => {
        if (!dotId) {
          return `<option value="${g.email}">${g.name}</option>`;
        }
        const sl = gvBcttSlotRow(g.id, dotId);
        const cap = sl ? `${sl.slotConLai ?? 0}/${sl.quota ?? 0}` : '0/0';
        return `<option value="${g.email}">${g.name} · Slot ${heLabel}: ${cap}</option>`;
      })
      .join('');

  if (prevSelected && list.some((g) => g.email === prevSelected)) {
    select.value = prevSelected;
  }
}

function fakeUpload(type, id, field) {
  const fileName = `${field}_${id}_${Date.now()}.pdf`;
  const bctt = DB.bcttList.find(b => b.id === id);
  if (bctt) { bctt[field] = fileName; toast('Upload file thành công: ' + fileName); renderBCTT(); }
}

function hoanTatBCTT(id) {
  const b = DB.bcttList.find(x => x.id === id);
  if (b) { b.trangThai = 'cho_cham'; addNotif(b.gvEmail, 'SV đã nộp BCTT', `${DB.currentUser.name} đã nộp đủ hồ sơ BCTT. Mời GV chấm.`); toast('Đã nộp hồ sơ BCTT, chờ GV chấm Pass/Fail!'); renderBCTT(); }
}

function fakeUploadKLTN(id, field) {
  const kltn = DB.kltnList.find(k => k.id === id);
  if (kltn) { kltn[field] = `${field}_${id}.pdf`; toast('Upload thành công'); renderKLTN(); }
}

function hoanTatKLTN(id) {
  const k = DB.kltnList.find(x => x.id === id);
  if (k) {
    k.trangThai = 'cham_diem';
    k.tomTat = 'Hệ thống đã ghi nhận tên đề tài và tóm tắt nội dung tự động.';
    addNotif(k.gvHDEmail, 'SV hoàn tất nộp KLTN', `${DB.currentUser.name} đã nộp KLTN: ${k.tenDeTai}`);
    toast('Hoàn tất nộp KLTN! Hệ thống đang xử lý...');
    renderKLTN();
  }
}

function chamBCTT(id, isPass) {
  const b = DB.bcttList.find(x => x.id === id);
  if (!b) return;
  b.trangThai = isPass ? 'pass' : 'fail';
  toast(isPass ? 'Đã chấm PASS cho BCTT' : 'Đã chấm FAIL cho BCTT', isPass ? 'success' : 'error');
  renderHuongDan();
}

function duyetKLTN(id, accept) {
  const k = DB.kltnList.find(x => x.id === id);
  if (!k) return;
  toast('KLTN không còn bước chờ duyệt. SV đăng ký là vào thực hiện ngay.', 'error');
}

function submitKLTN() {
  const ten = document.getElementById('fk-ten').value.trim();
  const mang = document.getElementById('fk-mang').value;
  const gvhd = document.getElementById('fk-gvhd').value;
  const dot = document.getElementById('fk-dot').value;
  if (!ten || !mang || !dot) { toast('Vui lòng điền đầy đủ!', 'error'); return; }
  DB.kltnList.push({ id: 'kltn' + Date.now(), svEmail: DB.currentUser.email, tenDeTai: ten, mangDeTai: mang, gvHDEmail: gvhd, gvPBEmail: null, hoiDong: null, dotId: dot, trangThai: 'thuc_hien', ngayDangKy: new Date().toISOString().split('T')[0], fileBai: null, fileTurnitin: null, tomTat: null, diemHD: null, diemPB: null, diemBB: null, fileBaiChinhSua: null, xacNhanGVHD: false, xacNhanCTHD: false });
  addNotif(gvhd, 'SV đăng ký KLTN mới', `${DB.currentUser.name} đăng ký KLTN: ${ten}`);
  toast('Đăng ký KLTN thành công!');
  renderKLTN();
}

function switchTab(e, tabId) {
  const parent = e.target.closest('.page') || document;
  parent.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  e.target.classList.add('active');
  document.getElementById(tabId)?.classList.add('active');
}

function renderDuyetDe() {
  const u = DB.currentUser;
  if (u.role === 'bm') {
    const gvList = DB.users.filter(x => x.role === 'gv' || x.role === 'bm');
    const el = document.getElementById('page-duyetde');
    let html = `<div class="page-header"><h1>🎯 Mở slot GV hướng dẫn theo đợt</h1><p>Duyệt quota để sinh viên có thể đăng ký</p></div>`;
    html += `<div class="card"><div class="table-wrap"><table><thead><tr><th>Giảng viên</th><th>Quota</th><th>Slot mở</th><th>Thao tác</th></tr></thead><tbody>`;
    gvList.forEach(g => {
      g.slotOpen = g.slotOpen !== false;
      html += `<tr><td>${g.name}</td>
  <td><strong>${g.quota || 0}</strong> / ${g.quota_max || g.quota || 0} <span style="font-size:11px;color:var(--text3)">(còn lại / tổng)</span></td>
  <td>${g.slotOpen ? '<span class="badge badge-green">Đang mở</span>' : '<span class="badge badge-red">Đã khóa</span>'}</td>
  <td><button class="btn btn-sm ${g.slotOpen ? 'btn-danger' : 'btn-success'}" onclick="toggleSlot('${g.email}')">${g.slotOpen ? 'Khóa slot' : 'Mở slot'}</button></td>
</tr>`;
    });
    html += `</tbody></table></div></div>`;
    el.innerHTML = html;
    return;
  }
  let list = [];
  if (u.role === 'gv') list = DB.bcttList.filter(b => b.gvEmail === u.email && b.trangThai === 'cho_duyet');
  const el = document.getElementById('page-duyetde');
  let html = `<div class="page-header"><h1>${u.role === 'bm' ? '👥 Duyệt & phân công PB' : '✅ Duyệt đề tài BCTT'}</h1><p>${list.length} đề tài cần xử lý</p></div>`;

  if (!list.length) {
    html += `<div class="card"><div class="empty-state"><div class="empty-state-icon">✅</div><div class="empty-state-title">Không có đề tài nào cần duyệt</div><div class="empty-state-desc">Tất cả đề tài đã được xử lý</div></div></div>`;
  } else {
    list.forEach(b => {
      const sv = getUser(b.svEmail);
      html += `<div class="card" style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
          <div style="flex:1">
            <div style="font-size:16px;font-weight:700;margin-bottom:6px;cursor:pointer;color:var(--primary)" title="Xem chi tiết" onclick="viewBCTTDetail('${b.id}')">${escapeHtml(b.tenDeTai)}</div>
            <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${escapeHtml(b.mangDeTai)} • ${escapeHtml(b.tenCongTy)}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <span class="badge badge-purple">👤 ${sv?.name || b.svEmail}</span>
              <span class="badge badge-gray">📅 ${b.ngayDangKy}</span>
            </div>
          </div>
          <div class="action-row">
            <button class="btn btn-ghost btn-sm" onclick="viewBCTTDetail('${b.id}')">👁 Chi tiết</button>
            ${u.role === 'gv' ? `
              <button class="btn btn-success btn-sm" onclick="duyetBCTT('${b.id}',true)">✓ Xác nhận</button>
              <button class="btn btn-warning btn-sm" onclick="doiTenDeTai('${b.id}')">✏️ Đổi tên</button>
              <button class="btn btn-danger btn-sm" onclick="duyetBCTT('${b.id}',false)">✗ Từ chối</button>
            ` : `
              <button class="btn btn-primary btn-sm" onclick="phanCongPB('${b.id}')">👥 Phân công PB</button>
            `}
          </div>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function toggleSlot(email) {
  const gv = getUser(email);
  if (!gv) return;
  gv.slotOpen = !gv.slotOpen;
  toast(`Đã ${gv.slotOpen ? 'mở' : 'khóa'} slot cho ${gv.name}`);
  renderDuyetDe();
}

async function duyetBCTT(id, accept) {
  const b = DB.bcttList.find(x => x.id === id);
  if (!b) return;
  try {
    await apiRequest("/api/bctt/approve", {
      method: "POST",
      body: JSON.stringify({
        dang_ky_ids: [b.dangKyId],
        action: accept ? "dong_y" : "tu_choi",
      }),
    });
    // Sync lại toàn bộ data từ server → quota GV tự cập nhật đúng
    await syncFromServer();
    toast(accept ? '✅ Đã xác nhận đề tài!' : '❌ Đã từ chối đề tài!', accept ? 'success' : 'error');
    if (DB.currentPage === 'huongdan') renderHuongDan();
    else renderDuyetDe();
    buildSidebar(DB.currentUser.role);
  } catch (err) {
    toast(err.message, 'error');
  }
}

function doiTenDeTai(id) {
  const b = DB.bcttList.find(x => x.id === id);
  showModal(`<div class="modal-header"><div class="modal-title">✏️ Đổi tên đề tài</div><button class="modal-close" onclick="closeModalForce()">✕</button></div>
    <div class="form-group"><label>Tên hiện tại</label><input type="text" value="${b.tenDeTai}" readonly style="background:var(--bg)"></div>
    <div class="form-group"><label>Tên đề tài mới *</label><input type="text" id="new-ten" value="${b.tenDeTai}"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">Hủy</button>
      <button class="btn btn-primary" onclick="saveDoiTen('${id}')">💾 Lưu & Xác nhận</button>
    </div>`);
}

function saveDoiTen(id) {
  const newName = document.getElementById('new-ten').value.trim();
  if (!newName) { toast('Vui lòng nhập tên!', 'error'); return; }
  const b = DB.bcttList.find(x => x.id === id);
  saveDoiTenApi(b, newName);
}

function phanCongPB(bcttId) {
  const gvList = DB.users.filter(u => u.role === 'gv' || u.role === 'bm');
  showModal(`<div class="modal-header"><div class="modal-title">👥 Phân công Phản biện</div><button class="modal-close" onclick="closeModalForce()">✕</button></div>
    <div class="form-group"><label>Chọn GV Phản biện *</label><select id="pb-gv">

    <div class="modal-footer">

function savePhanCongPB(bcttId) {
  const gv = document.getElementById('pb-gv').value;

  const b = DB.bcttList.find(x => x.id === bcttId);
  b.trangThai = 'phan_cong_pb';
  addNotif(gv, 'Được phân công phản biện BCTT', `Bạn được phân công PB cho SV ${getUser(b.svEmail)?.name}: ${b.tenDeTai}`);

}

function lapHoiDong(kltnId) {
  const k = DB.kltnList.find((x) => x.id === kltnId);

  const opts = gvList.map(g => `<option value="${g.email}">${g.name}</option>`).join('');

  const mangHint = k && k.mangDeTai ? `Lĩnh vực đề tài: <strong>${escapeHtml(k.mangDeTai)}</strong> — chỉ chọn GV cùng chuyên môn.` : '';
  showModal(`<div class="modal-header"><div class="modal-title">🏛️ Lập Hội đồng KLTN</div><button class="modal-close" onclick="closeModalForce()">✕</button></div>
    ${mangHint ? `<div style="font-size:12px;color:var(--text2);margin-bottom:12px">${mangHint}</div>` : ''}

    <div class="form-group"><label>Thành viên hội đồng * <span style="font-size:11px;color:var(--text3);font-weight:400">(có thể thêm nhiều giảng viên)</span></label>

        </div>
      </div>

    </div>

    <div class="form-group"><label>Địa điểm</label><select id="hd-loc"><option value="Online">Online</option><option value="Offline">Offline – Cơ sở 1</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">Hủy</button>
      <button class="btn btn-primary" onclick="saveLapHD('${kltnId}')">💾 Xác nhận</button>
    </div>`);
}

function saveLapHD(kltnId) {
  const ct = document.getElementById('hd-ct').value;
  const tk = document.getElementById('hd-tk').value;
  const tvEmails = Array.from(document.querySelectorAll('.hd-tv-select')).map(s => (s.value || '').trim()).filter(Boolean);
  const tvUnique = [...new Set(tvEmails)];
  if (!ct || !tk || tvUnique.length < 1) { toast('Chọn Chủ tịch, Thư ký và ít nhất 1 thành viên!', 'error'); return; }
  const k = DB.kltnList.find(x => x.id === kltnId);
  k.hoiDong = { ct, tv: tvUnique, tk };
  const notifySet = new Set([ct, tk, ...tvUnique]);
  notifySet.forEach(gvEmail => addNotif(gvEmail, 'Tham gia Hội đồng KLTN', `Bạn được mời tham gia HĐ cho SV ${getUser(k.svEmail)?.name}`));
  addNotif(k.svEmail, 'Hội đồng KLTN đã được lập', `Chủ tịch HĐ: ${getUser(ct)?.name}`);
  closeModalForce(); toast('Lập hội đồng thành công!'); renderPhanCong();
}

          html += `<div style="font-size:12px;color:var(--text3);margin-bottom:8px"><strong>GVHD duyệt trước.</strong> Chủ tịch HĐ chỉ thao tác sau khi GVHD đồng ý.</div>`;
          if (!k.xacNhanGVHD) {
            html += `<div style="display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-success btn-sm" onclick="revisionDecisionKLTN('${k.id}','gvhd',true)">✅ Đồng ý bài chỉnh sửa</button>
              <button class="btn btn-danger btn-sm" onclick="revisionDecisionKLTN('${k.id}','gvhd',false)">✗ Không đồng ý — SV nộp lại</button>
            </div>`;
          } else {
            html += `<span class="badge badge-green">GVHD đã đồng ý</span>`;
          }
        }
        if (isCT) {
          if (!k.xacNhanGVHD) {
            html += `<div style="font-size:12px;color:var(--text3);margin-top:8px">⏳ Chờ GVHD duyệt — Chủ tịch chưa thể thao tác.</div>`;
          } else if (!k.xacNhanCTHD) {
            html += `<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn btn-success btn-sm" onclick="revisionDecisionKLTN('${k.id}','cthd',true)">✅ Chủ tịch đồng ý</button>
              <button class="btn btn-danger btn-sm" onclick="revisionDecisionKLTN('${k.id}','cthd',false)">✗ Không đồng ý — SV nộp lại</button>
            </div>`;
          } else {
            html += `<span class="badge badge-green" style="margin-top:8px;display:inline-block">Chủ tịch đã xác nhận — KLTN hoàn thành</span>`;
          }
        }
        if (isTK) {
          html += `<div style="font-size:12px;color:var(--text3);margin-top:8px">Trạng thái duyệt: GVHD ${k.xacNhanGVHD ? '✓' : '…'} • CT ${k.xacNhanCTHD ? '✓' : '…'}</div>`;
        }
        html += `</div>`;
      }

      html += `</div>`;
    });
  }
  el.innerHTML = html;
}

function onBBSelectChange() {
  const kId = document.getElementById('bb-select').value;
  if (!kId) return;
  const k = DB.kltnList.find(x => x.id === kId);
  if (!k) return;
  const sv = getUser(k.svEmail);
  const ct = k.hoiDong?.ct ? getUser(k.hoiDong.ct) : null;
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val||''; };
  set('bb-tendeta', k.tenDeTai);
  set('bb-sv', sv?.name || k.svEmail);
  set('bb-masv', sv?.mssv || sv?.ma || '');
  set('bb-ct', ct?.name || '');
  set('bb-nxct', k.ctNote || '');
  set('bb-nxtv', k.pbNote || '');
}

function prefillBienBan(kId) {
  document.getElementById('bb-select').value = kId;
  onBBSelectChange();
  document.getElementById('bb-btn')?.scrollIntoView({ behavior:'smooth', block:'center' });
}

  const g = id => (document.getElementById(id)?.value||'').trim();
  if (!g('bb-select')) { toast('Vui lòng chọn sinh viên', 'error'); return; }
  if (!g('bb-yeucau')) { toast('Vui lòng nhập Yêu cầu chỉnh sửa', 'error'); return; }
  const payload = {
    tenKhoa: g('bb-nganh'), khoaHoc: g('bb-khoa'),
    tenDeTai: g('bb-tendeta'), sinhVien: g('bb-sv'), maSV: g('bb-masv'),
    nhanXetCT: g('bb-nxct'), nhanXetTV: g('bb-nxtv'),
    yeuCauChinhSua: g('bb-yeucau'), chuTichHD: g('bb-ct'), thuKy: g('bb-tk'),
    ngay: g('bb-ngay'), thang: g('bb-thang'), nam: g('bb-nam'),
  };
  const btn = document.getElementById('bb-btn');
  const loading = document.getElementById('bb-loading');
  btn.disabled = true; loading.style.display = 'flex';
  try {
    const res = await fetch(`${API_BASE}/api/bien-ban/xuat-docx`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-User-Id': String(DB.currentUser.id), 'X-User-Role': String(DB.currentUser.role_raw||DB.currentUser.role) },
      credentials: 'include',
      body: JSON.stringify(payload),
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message||'Lỗi tạo file'); }
    const blob = await res.blob();

    // Bước 2: cho tải xuống
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const fname = `BienBan_${payload.maSV}_${payload.tenDeTai.substring(0,30).replace(/\s+/g,'_')}.docx`;
    a.download = fname;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Bước 3: đọc blob -> base64 rồi upload lưu vào server
    const kId = document.getElementById('bb-select').value;
    const k = DB.kltnList.find(x => x.id === kId);
    if (k) {
      const reader = new FileReader();
      reader.onload = async () => {
        const b64 = reader.result.split(',')[1];
        await fetch(`${API_BASE}/api/bien-ban/luu`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-User-Id': String(DB.currentUser.id), 'X-User-Role': String(DB.currentUser.role_raw||DB.currentUser.role) },
          credentials: 'include',
          body: JSON.stringify({ maSV: payload.maSV, dangKyId: k.dangKyId, fileBase64: b64, filename: fname }),
        });
        await syncFromServer(); // cập nhật DB để mọi người thấy
      };
      reader.readAsDataURL(blob);
    }
    toast('Tải biên bản thành công! Mọi người có thể xem trong chi tiết đề tài.');
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false; loading.style.display = 'none';
}
}

async function changePassword() {
  const old = document.getElementById('pw-old').value;

  if (nw.length < 6) { toast('Mật khẩu tối thiểu 6 ký tự!', 'error'); return; }
  try {
    await apiRequest('/api/me/password', {
      method: 'POST',
      body: JSON.stringify({
        old_password: old,
        new_password: nw,
        confirm_password: conf,
      }),
    });
    if (DB.currentUser) DB.currentUser.password = '';
    const oldEl = document.getElementById('pw-old');

    toast('Đổi mật khẩu thành công!');

}

<script>
window.API_BASE = "https://ute-school.onrender.com";
const API_BASE = window.API_BASE;
const FETCH_OPTS = { credentials: "include" };

function toApiRole(role) {
  if (role === "sv") return "SV";
  if (role === "gv") return "GV";
  if (role === "bm") return "TBM";
  return role;
}

function toMaFromLoginInput(value) {
  const raw = (value || "").trim();
  if (!raw) return "";
  if (raw.includes("@")) return raw.split("@")[0].toUpperCase();
  return raw.toUpperCase();
}

function extractId(prefixed) {
  const m = String(prefixed || "").match(/(\d+)$/);
  return m ? parseInt(m[1], 10) : null;
}

async function apiRequest(path, options = {}) {
  const current = DB.currentUser || {};
  const authHeaders = {};
  if (current.id) authHeaders["X-User-Id"] = String(current.id);
  if (current.role_raw || current.role) authHeaders["X-User-Role"] = String(current.role_raw || toApiRole(current.role));
  const res = await fetch(`${API_BASE}${path}`, {
    ...FETCH_OPTS,
    headers: { "Content-Type": "application/json", ...authHeaders, ...(options.headers || {}) },
    ...options,
  });
  const body = await res.json().catch(() => ({ success: false, message: "Invalid JSON" }));
  if (!res.ok || body.success === false) {
    throw new Error(body.message || "Có lỗi từ server");
  }
  return body;
}

async function syncFromServer() {
  const out = await apiRequest("/api/bootstrap", { method: "GET" });
  const data = out.data || {};
  DB.users = data.users || [];
  DB.dotDangKy = data.dotDangKy || [];
  DB.bcttList = data.bcttList || [];
  DB.kltnList = data.kltnList || [];
  DB.gvSlots = data.gvSlots || [];
  const lv = new Set();
  DB.bcttList.forEach((x) => x.mangDeTai && lv.add(x.mangDeTai));
  DB.kltnList.forEach((x) => x.mangDeTai && lv.add(x.mangDeTai));
  DB.users.forEach((u) => (u.chuyenMon || []).forEach((m) => lv.add(m)));
  DB.mangDeTai = Array.from(lv);
  DB.chuyenMonList = DB.users
    .filter((u) => u.role === "gv" || u.role === "bm")
    .flatMap((u) => (u.chuyenMon || []).map((field) => ({ email: u.email, major: field, field })));
  // Đồng bộ lại thông tin currentUser (quota, chuyên môn, ...) từ server
  if (DB.currentUser && DB.currentUser.id) {
    const fromServer = DB.users.find((u) => u.id === DB.currentUser.id);
    if (fromServer) {
      DB.currentUser = { ...DB.currentUser, ...fromServer };
    }
    try {
      localStorage.setItem("currentUser", JSON.stringify(DB.currentUser));
    } catch (_) {}
  }
}

  originalInitApp();
};

  try {
    const ma = toMaFromLoginInput(document.getElementById("login-email").value);

      name: user.ho_ten,
      role: user.role,
      role_raw: user.role_raw,
      heDaoTao: user.heDaoTao || "",
      password: "",
      mssv: user.role === "sv" ? user.ma : undefined,
      msgv: user.role !== "sv" ? user.ma : undefined,
    };
    DB.currentUser = mapped;
    localStorage.setItem("currentUser", JSON.stringify(mapped));
    document.getElementById("screen-login").classList.remove("active");
    document.getElementById("screen-app").classList.add("active");

    if (mapped.role === "sv") navigateTo("dashboard");

};

async function uploadPdfForRegistration(dangKyId, loaiFile, file) {
  const current = DB.currentUser || {};
  const maSv = current.ma || current.mssv || "unknown";
  const fd = new FormData();
  fd.append("dang_ky_id", String(dangKyId));
  fd.append("loai_file", loaiFile);
  fd.append("ma_sv", maSv);
  fd.append("file", file);
  const headers = {};
  if (current.id) headers["X-User-Id"] = String(current.id);
  if (current.role_raw || current.role) headers["X-User-Role"] = String(current.role_raw || toApiRole(current.role));
  const res = await fetch(`${API_BASE}/api/upload`, {
    method: "POST",
    credentials: "include",
    headers,
    body: fd,
  });
  const body = await res.json();
  if (!res.ok || body.success === false) throw new Error(body.message || "Upload thất bại");
  return body.data.file_path;
}

function pickPdfAndUpload(handler) {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document";
  input.onchange = async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 20 * 1024 * 1024) {
      toast("File vượt quá 20MB", "error");
      return;
    }
    await handler(file);
  };
  input.click();
}

      <button class="btn btn-ghost" onclick="closeModalForce()">Hủy</button>
      <button class="btn btn-primary" onclick="savePhanCongPBKLTN('${kltnId}')">💾 Lưu phân công</button>
    </div>`);
};

savePhanCongPBKLTN = async function savePhanCongPBKLTNApi(kltnId) {
  const gvPbEmail = document.getElementById("pbkltn-gv")?.value;
  const gvHdEmail = document.getElementById("pbkltn-hd")?.value;
  const ctEmail = document.getElementById("pc-hd-ct")?.value?.trim() || "";
  const tkEmail = document.getElementById("pc-hd-tk")?.value?.trim() || "";
  const tvEmails = Array.from(document.querySelectorAll(".pc-tv-select"))
    .map((s) => (s.value || "").trim())
    .filter(Boolean);
  const tvUnique = [...new Set(tvEmails)];
  const k = DB.kltnList.find((x) => x.id === kltnId);
  const gvPb = DB.users.find((u) => u.email === gvPbEmail);
  const gvHd = gvHdEmail ? DB.users.find((u) => u.email === gvHdEmail) : null;
  const ct = ctEmail ? DB.users.find((u) => u.email === ctEmail) : null;
  const tk = tkEmail ? DB.users.find((u) => u.email === tkEmail) : null;
  if (!k || !gvPb) return toast("Vui lòng chọn GV phản biện", "error");

  const councilFilled = ctEmail || tkEmail || tvUnique.length > 0;
  const councilComplete = ct && tk && tvUnique.length >= 1;
  if (councilFilled && !councilComplete) {
    return toast("Hội đồng: cần đủ Chủ tịch, Thư ký và ít nhất 1 thành viên (hoặc để trống cả ba phần).", "error");
  }

  let tvIds = tvUnique.map((e) => DB.users.find((u) => u.email === e)).filter(Boolean).map((u) => u.id);
  if (councilComplete) {
    tvIds = tvIds.filter((id) => id !== ct.id && id !== tk.id);
    if (tvIds.length < 1) return toast("Thành viên HĐ không được trùng Chủ tịch/Thư ký; cần ít nhất 1 TV khác CT/TK.", "error");
  }

  const km = (k.mangDeTai || "").trim();
  if (km) {
    const allow = new Set(gvListMatchingKltnMajor(k).map((u) => u.email));
    const must = [gvPbEmail];
    if (gvHdEmail) must.push(gvHdEmail);
    if (councilComplete) must.push(ctEmail, tkEmail, ...tvUnique);
    if (must.some((e) => e && !allow.has(e))) {
      return toast("Mọi người được phân công phải cùng lĩnh vực với mảng đề tài (" + km + ").", "error");
    }
  }

  try {
    const body = { dang_ky_id: k.dangKyId, gv_pb_id: gvPb.id };
    if (gvHd) body.gv_hd_id = gvHd.id;
    await apiRequest("/api/phan-cong", {
      method: "POST",
      body: JSON.stringify(body),
    });
    if (councilComplete) {
      await apiRequest("/api/phan-cong/hoi-dong", {
        method: "POST",
        body: JSON.stringify({
          dang_ky_id: k.dangKyId,
          ct_id: ct.id,
          tk_id: tk.id,
          tv_ids: tvIds,
        }),
      });
    }
    await syncFromServer();
    closeModalForce();
    toast(councilComplete ? "Đã phân công GVHD/PB và lập hội đồng" : "Đã phân công GVHD & phản biện");
    renderPhanCong();
  } catch (err) {
    toast(err.message, "error");
  }
};

document.addEventListener("DOMContentLoaded", async () => {
  const saved = localStorage.getItem("currentUser");
  if (!saved) return;
  let parsed;
  try {
    parsed = JSON.parse(saved);
  } catch (_) {
    localStorage.removeItem("currentUser");
    return;
  }
  if (!parsed || parsed.id == null) {
    localStorage.removeItem("currentUser");
    return;
  }
  // Gán user trước khi gọi API để gửi X-User-Id / X-User-Role (F5 vẫn đăng nhập khi cookie phiên thiếu)
  DB.currentUser = parsed;
  try {
    await apiRequest("/api/me", { method: "GET" });
    document.getElementById("screen-login").classList.remove("active");
    document.getElementById("screen-app").classList.add("active");
    await initApp();
    try {
      localStorage.setItem("currentUser", JSON.stringify(DB.currentUser));
    } catch (_) {}
  } catch (_) {
    DB.currentUser = null;
    localStorage.removeItem("currentUser");
  }
});
</script>
